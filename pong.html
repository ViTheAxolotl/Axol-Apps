<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/latest/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href = "css/Styles.css" rel = "stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name = "description" content = "Pong Game">
    <link rel="shortcut icon" href="images/smallerBall.png">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-primary"> 
        <script src="js/pageSetup.js" class="noParent" type="module"></script>
    </nav>

    <div class="container">
        <div class="row align-items-top">
            <div id = "header" class = "col-12 color-UP-black bg-UP-purple">
                <h1>Pong</h1>
                <img src = "images/Ball.png" alt = "Pic of a Pong ball" title = "Pic of a Pong ball" width = "50" height = "50" scrolling="no"/>
                <h3>By Vi Snyder</h3>
            </div>


            <div id = "info" class = "bg-UP-blue color-UP-black col-md-12 col-sm-12 center">
                <iframe class = "center" src="https://www.greenfoot.org/scenarios/26612?embed=true" scrolling="no"></iframe>
            </div>

            <div id = "hometown" class = "bg-UP-purple color-UP-black col-md-12 col-sm-12 ">
                <h3>Controls:</h3>
                <hr>
                <ul>
                    <li>Left Controls:
                        <ul>
                            <li>w - moves up</li>
                            <li>s - moves down</li>
                        </ul>
                    </li>

                    <li>Right Controls:
                        <ul>
                            <li>up arrow - moves up</li>
                            <li>down arrow - moves down</li>
                        </ul>
                    </li>	
                </ul>
            </div>

            <div id = "footer" class = "col-12 bg-UP-blue">
            </div>
        </div>
    </div>

    <script scr="js/bootstrap/scripts.js"></script>
     <script src="js/bootstrap/bootstrap.bundle.min.js"></script>
     <script src="js/iframe.js"></script>
</body>
</html>
